name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Bump version & tag
    runs-on: ubuntu-latest
    # Skip the commit that cz itself creates to avoid infinite loops
    if: "!contains(github.event.head_commit.message, 'bump:')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install commitizen

      - name: Configure git bot identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and generate changelog
        id: bump
        run: |
          if cz bump --changelog --yes 2>&1; then
            echo "bumped=true"  >> "$GITHUB_OUTPUT"
            echo "version=$(cz version --project)" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to bump — no conventional commits since last tag."
          fi

      - name: Push commit and tag
        if: steps.bump.outputs.bumped == 'true'
        run: git push --follow-tags

      # The Terraform Registry detects the new tag automatically within ~10 min
