name: Cost Estimate

on:
  pull_request:
    branches: [main]

jobs:
  infracost:
    name: Infracost diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate base estimate (main branch)
        run: |
          git fetch origin main
          git stash
          infracost breakdown \
            --path examples/basic \
            --format json \
            --out-file /tmp/infracost-base.json \
            --terraform-var "tailscale_api_key=dummy"
          git stash pop

      - name: Generate PR estimate
        run: |
          infracost breakdown \
            --path examples/basic \
            --format json \
            --out-file /tmp/infracost-pr.json \
            --terraform-var "tailscale_api_key=dummy"

      - name: Post diff comment on PR
        uses: infracost/actions/comment@v3
        with:
          path: /tmp/infracost-pr.json
          compare-to: /tmp/infracost-base.json
          behavior: update
