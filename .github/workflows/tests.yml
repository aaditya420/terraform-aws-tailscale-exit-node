name: Module Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Validation tests (no AWS deploy needed) ─────────────────────────────────
  validations:
    name: Validation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r tests/requirements.txt

      - run: pytest tests/test_validations.py -v --junit-xml=results/validations.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-validations
          path: results/

  # ── Integration tests (matrix, each deploys + destroys) ────────────────────
  integration:
    name: "${{ matrix.scenario }} scenario"
    runs-on: ubuntu-latest
    needs: validations
    strategy:
      fail-fast: false
      matrix:
        scenario: [basic, complete, no_adguard, x86_64, custom_vpc]

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r tests/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      # Pre-init the scenario so plan/apply is faster
      - name: terraform init
        run: |
          terraform -chdir=tests/scenarios/${{ matrix.scenario }} init \
            -reconfigure \
            -input=false

      - name: Run pytest for ${{ matrix.scenario }}
        env:
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
          AWS_DEFAULT_REGION: eu-west-3
        run: |
          pytest tests/test_${{ matrix.scenario }}.py \
            -v \
            --timeout=900 \
            --junit-xml=results/${{ matrix.scenario }}.xml

      # Always destroy — runs even when pytest fails
      - name: terraform destroy (cleanup)
        if: always()
        env:
          TF_VAR_tailscale_api_key: ${{ secrets.TAILSCALE_API_KEY }}
          TF_VAR_aws_region: eu-west-3
        run: |
          terraform -chdir=tests/scenarios/${{ matrix.scenario }} destroy \
            -auto-approve \
            -input=false \
            || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.scenario }}
          path: results/
