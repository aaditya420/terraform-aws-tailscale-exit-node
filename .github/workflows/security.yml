name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"  # Weekly, Monday 08:00 UTC

jobs:
  tfsec:
    name: tfsec (IaC security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

  checkov:
    name: checkov (policy compliance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          output_format: cli
          soft_fail: false
          # CKV_AWS_8: no dedicated host (intentional), CKV2_AWS_41: no IAM role (exit node needs none)
          skip_check: CKV_AWS_8,CKV2_AWS_41
          skip_path: tests/,examples/

  trivy:
    name: trivy (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: HIGH,CRITICAL
          exit-code: "1"
